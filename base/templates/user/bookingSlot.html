    <script src="adminResources/js/html5shiv.js"></script>
    <script src="adminResources/js/respond.min.js"></script>
<![endif]-->


    <script type="text/javascript">
        function loadTimeSlot() {
            var bookingDate = document.getElementById("bookingDate");
            var bookingSlot = document.getElementById("bookingSlot");
            var bookResult = document.getElementById("bookResult");
            bookResult.innerHTML = "";
            var ajax = new XMLHttpRequest();
            ajax.onreadystatechange = function () {
                if (ajax.readyState === 4) {
                    console.log(ajax.responseText);
                    var jsn = JSON.parse(ajax.responseText);
                    if (jsn.length != 0) {

                        if (jsn['status'] == true) {
                            bookResult.style.color = "green";
                            bookResult.value = jsn['response'];
                            bookResult.style.display = "";
                            document.getElementById("bookSubmit").disabled = false;
                        }
                        else {
                            bookResult.style.color = "red";
                            bookResult.value = jsn['response'];
                            bookResult.style.display = "";
                            document.getElementById("bookSubmit").disabled = true;
                        }
                    }
                }
            };
            ajax.open("get", "/user/ajax_booking_date?bookingDate=" + bookingDate.value + "&bookingSlot=" + bookingSlot.value, true);
            ajax.send();
        }
    </script>


</head>

                <div class="card">
                    <div class="card-body">
                        <form class="m-t-10" novalidate action="/user/insert_book_slot"
                              method="post" onsubmit="return bookingSlot()">


                            <div class="form-group">
                                <div class="controls">
                                    <select name="bookingNameId" id="bookingNameId" class="form-control"
                                            style="font-size: 15px">
                                        <option value="None" style="display: none;">Select Crop Name
                                        </option>
                                        {% for row in croprequest_vo_list %}
                                            <option value="{{ row[1]['crop_name_id'] }}">{{ row[1]['crop_name'] }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>


                            <div class="form-group">
                                <h5>Enter Date <span class="text-danger">*</span></h5>
                                <div class="controls">
                                    <input type="date" name="bookingDate" id="bookingDate"
                                           class="form-control" placeholder="MM/DD/YYYY"></div>
                            </div>

                            <div class="form-group">
                                <div class="controls">

                                    <select name="bookingSlot" id="bookingSlot" onchange="loadTimeSlot()"
                                            class="form-control" style="font-size: 15px">
                                        {% for row in timeslot_vo_list %}
                                            <option value="None" style="display: none;">Select Time Slot
                                            </option>
                                            <option value="{{ row['timeslot_id'] }}">{{ row['timeslot_type'] }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="controls">
                                    <input type="text" style="border:none;display:none" id="bookResult"/>
                                </div>
                            </div>
                            <div class="text-xs-right">
                                <button type="submit" id="bookSubmit" class="btn btn-info">Add</button>
                            </div>
                        </form>
                    </div>
                </div>
