    <script>
        function loadTransportRequest() {
            var vehicleType = document.getElementById("vehicleType");
            var ajax = new XMLHttpRequest();
            ajax.onreadystatechange = function () {
                if (ajax.readyState === 4) {

                    var json = JSON.parse(ajax.responseText);


                    $('#tableBody').html();
                    var tableRow = "";
                    for (var index = 0; index < json.length; index++) {
                        tableRow = tableRow + '<tr><td>' + json[index]['vehicle_type'] + '</td>'
                            + '<td>' + json[index]['vehicle_number'] + '</td>'
                            + '<td>' + json[index]['vehicle_charge'] + '</td>'
                            + '<td>'
                            + '<a href="insert_transport_request?vehicleId=' + json[index]['vehicle_id'] + '"><button type="submit" class="btn btn-success btn-rounded">Select</button>'
                            + '</td>'
                            + '</tr>';
                    }
                    $("#tableBody").html(tableRow);
                }
            };
            ajax.open("get", "/user/ajax_vehicle?vehicleType=" + vehicleType.value, true);
            ajax.send();
        }

    </script>
