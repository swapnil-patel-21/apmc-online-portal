<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Tell the browser to be responsive to screen width -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <!-- Favicon icon -->
    <link rel="icon" type="image/png" sizes="16x16" href="../../static/adminResources/images/favicon.png">
    <title>Edit Crop</title>
    <!-- Custom CSS -->
    <link href="../../static/adminResources/css/style.min.css" rel="stylesheet">
    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
    <script src="adminResources/js/html5shiv.js"></script>
    <script src="adminResources/js/respond.min.js"></script>
<![endif]-->
</head>

<body>

<!-- ============================================================== -->
<!-- Main wrapper - style you can find in pages.scss -->
<!-- ============================================================== -->
<div id="main-wrapper">
    <!-- ============================================================== -->
    <!-- Topbar header - style you can find in pages.scss -->
    <!-- ============================================================== -->


    {% include 'user/header.html' %}


    <!-- ============================================================== -->
    <!-- End Topbar header -->
    <!-- ============================================================== -->
    <!-- ============================================================== -->
    <!-- Left Sidebar - style you can find in sidebar.scss  -->
    <!-- ============================================================== -->


    {% include 'user/menu.html' %}


    <!-- ============================================================== -->
    <!-- End Left Sidebar - style you can find in sidebar.scss  -->
    <!-- ============================================================== -->
    <!-- ============================================================== -->
    <!-- Page wrapper  -->
    <!-- ============================================================== -->
    <div class="page-wrapper">
        <!-- ============================================================== -->
        <!-- Bread crumb and right sidebar toggle -->
        <!-- ============================================================== -->
        <div class="page-breadcrumb">
            <div class="row">
                <div class="col-5 align-self-center">
                    <h4 class="page-title">Edit Crop Request</h4>
                    <div class="d-flex align-items-center">

                    </div>
                </div>
                <div class="col-7 align-self-center">
                    <div class="d-flex no-block justify-content-end align-items-center">
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item">
                                    <a href="/">Home</a>
                                </li>
                                <li class="breadcrumb-item active" aria-current="page">Edit Crop Request</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
        <!-- ============================================================== -->
        <!-- End Bread crumb and right sidebar toggle -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Container fluid  -->
        <!-- ============================================================== -->
        <div class="container-fluid">
            <!-- ============================================================== -->
            <!-- Start Page Content -->
            <!-- ============================================================== -->
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <form class="m-t-10" novalidate action="update_croprequest" method="post">
                            {% for value in croprequest_vo_list %}
                                <div class="form-group">
                                    <div class="controls">
                                        <select name="cropRequestCropType" id="cropName" required class="form-control">
                                            <option selected disabled
                                                    style="display: none">{{ value[1]['crop_type'] }}</option>
                                            {% for row in crop_vo_list %}
                                                <option value="{{ row['crop_id'] }}">{{ row['crop_type'] }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">

                                    <h5>Crop Name <span class="text-danger">*</span></h5>
                                    <div class="controls">
                                        <input type="text" name="cropRequestCropName" class="form-control" required
                                               data-validation-required-message="This field is required"
                                               value="Name"></div>
                                </div>
                                <div class="form-group">

                                    <h5>Crop Quantity <span class="text-danger">*</span></h5>
                                    <div class="controls">
                                        <input type="text" name="cropRequestCropQuantity" class="form-control" required
                                               data-validation-required-message="This field is required"
                                               value="{{ value[0]['croprequest_crop_quantity'] }}"></div>
                                </div>
                                <div class="form-group">
                                    <h5> Crop Request Description <span class="text-danger">*</span></h5>
                                    <div class="controls">
                                            <textarea name="cropRequestCropDescription" id="cropDescription"
                                                      class="form-control"
                                                      required
                                                      autofocus="">{{ value[0]['croprequest_crop_description'] }}</textarea>
                                    </div>
                                </div>
                                <div class="text-xs-right">
                                    <button type="submit" class="btn btn-info">Submit</button>
                                </div>
                                <input type="hidden" name="cropRequestId" value="{{ value[0]['croprequest_id'] }}">
                            {% endfor %}
                        </form>
                    </div>
                </div>
            </div>
            <!-- ============================================================== -->
            <!-- End PAge Content -->
            <!-- ============================================================== -->
            <!-- ============================================================== -->
            <!-- Right sidebar -->
            <!-- ============================================================== -->
            <!-- .right-sidebar -->
            <!-- ============================================================== -->
            <!-- End Right sidebar -->
            <!-- ============================================================== -->
        </div>
        <!-- ============================================================== -->
        <!-- End Container fluid  -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- footer -->
        <!-- ============================================================== -->

        {% include 'user/footer.html' %}

        <!-- ============================================================== -->
        <!-- End footer -->
        <!-- ============================================================== -->
    </div>
    <!-- ============================================================== -->
    <!-- End Page wrapper  -->
    <!-- ============================================================== -->
</div>
<!-- ============================================================== -->
<!-- End Wrapper -->
<!-- ============================================================== -->
<!-- ============================================================== -->


<div class="chat-windows"></div>
<!-- ============================================================== -->
<!-- All Jquery -->
<!-- ============================================================== -->
<script src="../../static/adminResources/js/jquery.min.js"></script>
<!-- Bootstrap tether Core JavaScript -->
<script src="../../static/adminResources/js/popper.min.js"></script>
<script src="../../static/adminResources/js/bootstrap.min.js"></script>
<!-- apps -->
<script src="../../static/adminResources/js/app.min.js"></script>
<script src="../../static/adminResources/js/app.init.light-sidebar.js"></script>
<script src="../../static/adminResources/js/app-style-switcher.js"></script>
<!-- slimscrollbar scrollbar JavaScript -->
<script src="../../static/adminResources/js/perfect-scrollbar.jquery.min.js"></script>
<script src="../../static/adminResources/js/sparkline.js"></script>
<!--Wave Effects -->
<script src="../../static/adminResources/js/waves.js"></script>
<!--Menu sidebar -->
<script src="../../static/adminResources/js/sidebarmenu.js"></script>
<!--Custom JavaScript -->
<script src="../../static/adminResources/js/custom.min.js"></script>
<script src="../../static/adminResources/js/validation.js"></script>
<script>
    !function (window, document, $) {
        "use strict";
        $("input,select,textarea").not("[type=submit]").jqBootstrapValidation();
    }(window, document, jQuery);
</script>
</body>

</html>
