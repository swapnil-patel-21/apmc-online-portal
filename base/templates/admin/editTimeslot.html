<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Tell the browser to be responsive to screen width -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <!-- Favicon icon -->
    <link rel="icon" type="image/png" sizes="16x16" href="../../static/adminResources/images/favicon.png">
    <title>Edit TimeSlot</title>
    <!-- Custom CSS -->
    <link href="../../static/adminResources/css/style.min.css" rel="stylesheet">
    <link href="../../static/adminResources/css/jquery.toast.min.css" rel="stylesheet">
    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
    <script src="adminResources/js/html5shiv.js"></script>
    <script src="adminResources/js/respond.min.js"></script>
<![endif]-->
</head>

<body>

<!-- ============================================================== -->
<!-- Main wrapper - style you can find in pages.scss -->
<!-- ============================================================== -->
<div id="main-wrapper">
    <!-- ============================================================== -->
    <!-- Topbar header - style you can find in pages.scss -->
    <!-- ============================================================== -->


    {% include 'admin/header.html' %}


    <!-- ============================================================== -->
    <!-- End Topbar header -->
    <!-- ============================================================== -->
    <!-- ============================================================== -->
    <!-- Left Sidebar - style you can find in sidebar.scss  -->
    <!-- ============================================================== -->


    {% include 'admin/menu.html' %}


    <!-- ============================================================== -->
    <!-- End Left Sidebar - style you can find in sidebar.scss  -->
    <!-- ============================================================== -->
    <!-- ============================================================== -->
    <!-- Page wrapper  -->
    <!-- ============================================================== -->
    <div class="page-wrapper">
        <!-- ============================================================== -->
        <!-- Bread crumb and right sidebar toggle -->
        <!-- ============================================================== -->
        <div class="page-breadcrumb">
            <div class="row">
                <div class="col-5 align-self-center">
                    <h4 class="page-title">Edit TimeSlot</h4>
                    <div class="d-flex align-items-center">

                    </div>
                </div>
                <div class="col-7 align-self-center">
                    <div class="d-flex no-block justify-content-end align-items-center">
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item">
                                    <a href="/">Home</a>
                                </li>
                                <li class="breadcrumb-item active" aria-current="page">Edit TimeSlot</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
        <!-- ============================================================== -->
        <!-- End Bread crumb and right sidebar toggle -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Container fluid  -->
        <!-- ============================================================== -->
        <div class="container-fluid">
            <!-- ============================================================== -->
            <!-- Start Page Content -->
            <!-- ============================================================== -->
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <form class="m-t-10" novalidate action="/admin/update_timeslot" method="post" onsubmit="return"
                              enctype="multipart/form-data">
                            {% for row in timeslot_vo_list %}
                                <div class="form-group">
                                    <div class="controls">
                                        <select name="timeslotType" id="timeslotType" class="form-control">
                                            <option selected disabled
                                                    style="display: none">{{ row['timeslot_type'] }}</option>
                                            <option value="10:00 to 11:00">10:00 to 11:00</option>
                                            <option value="11:00 to 12:00">11:00 to 12:00</option>
                                            <option value="12:00 to 13:00">12:00 to 13:00</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <h5> Timeslot Capacity <span class="text-danger">*</span></h5>
                                    <div class="controls">
                                        <input type="text" value="{{ row['timeslot_capacity'] }}"
                                               name="timeslotCapacity" id="timeslotCapacity" class="form-control"></div>
                                </div>

                                <input type="hidden" name="timeslotId" value="{{ row['timeslot_id'] }}">
                                <div class="text-xs-right">
                                    <input type="submit" class="btn btn-info">
                                </div>
                            {% endfor %}
                        </form>
                    </div>
                </div>
            </div>
            <!-- ============================================================== -->
            <!-- End PAge Content -->
            <!-- ============================================================== -->
            <!-- ============================================================== -->
            <!-- Right sidebar -->
            <!-- ============================================================== -->
            <!-- .right-sidebar -->
            <!-- ============================================================== -->
            <!-- End Right sidebar -->
            <!-- ============================================================== -->
        </div>
        <!-- ============================================================== -->
        <!-- End Container fluid  -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- footer -->
        <!-- ============================================================== -->

        {% include 'admin/footer.html' %}

        <!-- ============================================================== -->
        <!-- End footer -->
        <!-- ============================================================== -->
    </div>
    <!-- ============================================================== -->
    <!-- End Page wrapper  -->
    <!-- ============================================================== -->
</div>
<!-- ============================================================== -->
<!-- End Wrapper -->
<!-- ============================================================== -->
<!-- ============================================================== -->


<div class="chat-windows"></div>
<!-- ============================================================== -->
<!-- All Jquery -->
<!-- ============================================================== -->
<script src="../../static/adminResources/js/jquery.min.js"></script>
<!-- Bootstrap tether Core JavaScript -->
<script src="../../static/adminResources/js/popper.min.js"></script>
<script src="../../static/adminResources/js/bootstrap.min.js"></script>
<!-- apps -->
<script src="../../static/adminResources/js/app.min.js"></script>
<script src="../../static/adminResources/js/app.init.light-sidebar.js"></script>
<script src="../../static/adminResources/js/app-style-switcher.js"></script>
<!-- slimscrollbar scrollbar JavaScript -->
<script src="../../static/adminResources/js/perfect-scrollbar.jquery.min.js"></script>
<script src="../../static/adminResources/js/sparkline.js"></script>
<!--Wave Effects -->
<script src="../../static/adminResources/js/waves.js"></script>
<!--Menu sidebar -->
<script src="../../static/adminResources/js/sidebarmenu.js"></script>
<!--Custom JavaScript -->
<script src="../../static/adminResources/js/custom.min.js"></script>
<script src="../../static/adminResources/js/validation.js"></script>


<script src="../../static/adminResources/js/toaster.js"></script>
<script src="../../static/adminResources/js/customValidation.js"></script>
<script src="../../static/adminResources/js/jquery.toast.min.js"></script>


<script>
    !function (window, document, $) {
        "use strict";
        $("input,select,textarea").not("[type=submit]").jqBootstrapValidation();
    }(window, document, jQuery);
</script>
</body>

</html>
